        // Init theme immediately to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'system';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        if (savedTheme === 'system') {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            if (prefersDark.matches) {
                document.documentElement.classList.add('system-dark');
            }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            z-index: 1000; display: none; opacity: 0; transition: opacity 0.3s ease;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content {
            background: var(--color-bg-card); border: 1px solid var(--color-border);
            border-radius: 16px; padding: 2rem; max-width: 800px; width: 100%;
            max-height: 90vh; overflow-y: auto; position: relative;
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-close {
            position: absolute; top: 1.5rem; right: 1.5rem;
            background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
            width: 32px; height: 32px; color: var(--color-text-primary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.2); }
        
        /* Filter Chips */
        .filter-container { display: flex; gap: 0.75rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 2rem; -webkit-overflow-scrolling: touch; }
        .filter-chip {
            padding: 0.5rem 1rem; border-radius: 9999px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--color-border); color: var(--color-text-secondary);
            font-size: 14px; cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .filter-chip:hover, .filter-chip.active {
            background: rgba(34,197,94,0.15); color: var(--color-accent); border-color: var(--color-accent);

        /* Dropdown Styles */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-menu {
            display: none; position: absolute; right: 0; top: 100%; margin-top: 0.5rem;
            background: var(--color-bg-card); border: 1px solid var(--color-border);

            opacity: 0; transform: translateY(-10px); transition: opacity 0.2s, transform 0.2s;
        }
        .dropdown.open .dropdown-menu { display: block; opacity: 1; transform: translateY(0); }
        .dropdown-item {
            display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem;
            color: var(--color-text-primary); text-decoration: none; border-radius: 8px;
            cursor: pointer; transition: background 0.2s; font-size: 14px;
        }
        .dropdown-item:hover, .dropdown-item.active { background: rgba(255,255,255,0.05); }
        .dropdown-item.active { color: var(--color-accent); }
        .dropdown-item svg { width: 16px; height: 16px; opacity: 0.7; }
        .dropdown-item.active svg { opacity: 1; stroke: var(--color-accent); }
    </style>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const blogsData = [{"category": "Tech", "content": "Refactoring complete with Streamlit.", "date": "2026-02-10", "id": 1, "title": "Welcome to my new site!"}];
    let currentSharedBlog = null;

    function openBlogDetail(blog, updateUrl = true) {
        currentSharedBlog = blog;
        const modal = document.getElementById('blog-detail-modal');
        document.getElementById('modal-title').textContent = blog.title;
        document.getElementById('modal-date').textContent = blog.date;
        document.getElementById('modal-category').textContent = blog.category;

        const content = blog.content || "";
        if (typeof marked !== 'undefined') {
            document.getElementById('modal-body').innerHTML = marked.parse(content);
        } else {
            document.getElementById('modal-body').innerHTML = content.replace(/\n/g, '<br>');
        }

        if (updateUrl) {
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?id=' + blog.id;
            window.history.pushState({ path: newUrl }, '', newUrl);
        }

        modal.showModal();
    }

    function closeBlogModal() {
        document.getElementById('blog-detail-modal').close();
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.pushState({ path: newUrl }, '', newUrl);
    }

    async function shareBlog() {
        if (!currentSharedBlog) return;
        const url = window.location.href;
        if (navigator.share) {
            try {
                await navigator.share({
                    title: currentSharedBlog.title,
                    url: url
                });
            } catch (err) {
                console.log('Share error', err);
            }
        } else {
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copied to clipboard!');
            });
        }
    }

    document.getElementById('blog-detail-modal').addEventListener('click', (e) => {
        if (e.target.id === 'blog-detail-modal') {
            closeBlogModal();
        }
    });

    // Handle initial load with ID
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const idParam = urlParams.get('id');
        if (idParam) {
            const blogId = parseInt(idParam, 10);
            const blog = blogsData.find(b => b.id === blogId);
            if (blog) {
                openBlogDetail(blog, false);
            }
        }
    });

    function performSearch() {
        const searchInput = document.getElementById('search-input');
        const query = searchInput ? searchInput.value.toLowerCase() : '';
        const items = document.querySelectorAll('.timeline-item');

        items.forEach(item => {
            const title = item.querySelector('h3').textContent.toLowerCase();
            const content = item.querySelector('p').textContent.toLowerCase();
            const tag = item.querySelector('.category-tag').textContent.toLowerCase();

            if (title.includes(query) || content.includes(query) || tag.includes(query)) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    }
</script>

    <script>
        function openModal(contentHtml) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = contentHtml;
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('active'));
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget && !event.target.classList.contains('modal-close')) return;
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = '';
            }, 300);
        }

        // Filter Logic
        function filterItems(category, itemSelector) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            if(event) event.target.classList.add('active');
            
            const items = document.querySelectorAll(itemSelector);
            items.forEach(item => {
                const itemCat = item.dataset.category;
                if (category === 'all' || itemCat === category) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function toggleThemeDropdown(event) {
            document.getElementById('theme-dropdown-container').classList.toggle('open');
            event.stopPropagation();
        }

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('theme-dropdown-container');
            if (dropdown && !dropdown.contains(event.target)) {
                dropdown.classList.remove('open');
            }
        });

        const prefersDarkMedia = window.matchMedia('(prefers-color-scheme: dark)');
        prefersDarkMedia.addEventListener('change', (e) => {
            if (localStorage.getItem('theme') === 'system' || !localStorage.getItem('theme')) {
                if (e.matches) {
                    document.documentElement.classList.add('system-dark');
                } else {
                    document.documentElement.classList.remove('system-dark');
                }
            }
        });

        // Theme Toggle Logic
        function updateThemeIcon() {
            const currentTheme = localStorage.getItem('theme') || 'system';
            document.querySelectorAll('.dropdown-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.querySelector(`.dropdown-item[data-theme-val="${currentTheme}"]`);
            if (activeItem) activeItem.classList.add('active');

            document.getElementById('theme-icon-moon').style.display = 'none';
            document.getElementById('theme-icon-sun').style.display = 'none';
            document.getElementById('theme-icon-system').style.display = 'none';

            if (currentTheme === 'light') {
                document.getElementById('theme-icon-sun').style.display = 'block';
            } else if (currentTheme === 'dark') {
                document.getElementById('theme-icon-moon').style.display = 'block';
            } else {
                document.getElementById('theme-icon-system').style.display = 'block';
            }
        }

        function setTheme(newTheme) {
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            if (newTheme === 'system') {
                if (prefersDarkMedia.matches) {
                    document.documentElement.classList.add('system-dark');
                } else {
                    document.documentElement.classList.remove('system-dark');
                }
            } else {
                document.documentElement.classList.remove('system-dark');
            }
            
            updateThemeIcon();
            document.getElementById('theme-dropdown-container').classList.remove('open');
        }

        // Run once on mount to set correct icon
        updateThemeIcon();
    </script>
